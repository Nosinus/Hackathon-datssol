as_of: 2026-04-17
policy:
  note: "DatsSol v1 imported from official release docs; keep adapter boundaries explicit."
source_priority:
  - type: official_release_doc
    path: docs/input/Документация ИГРЫ.docx
    scope: datssol
  - type: official_contract
    path: docs/input/datsblack_openapi.json
    scope: datsblack
  - type: curated_markdown
    path: docs/input/
    scope: implementation notes
known:
  datssol:
    auth_header:
      value: X-Auth-Token
      confidence: high
      basis: docs/input/Документация ИГРЫ.docx
    endpoints:
      value:
        - GET /api/arena
        - POST /api/command
        - GET /api/logs
      confidence: high
      basis: docs/input/Документация ИГРЫ.docx
    budget_field:
      value: nextTurnIn
      confidence: high
      basis: docs/input/Документация ИГРЫ.docx
    command_response:
      value: code + errors
      confidence: high
      basis: docs/input/Документация ИГРЫ.docx
    action_shape:
      value:
        - command[].path=[[authorX,authorY],[outputX,outputY],[targetX,targetY]]
        - plantationUpgrade
        - relocateMain=[[fromX,fromY],[toX,toY]]
      confidence: high
      basis: docs/input/Документация ИГРЫ.docx
  datsblack:
    auth_header:
      value: X-API-Key
      confidence: high
      basis: docs/input/datsblack_openapi.json
unknown:
  - live_rate_limits_and_throttling
  - exact_logs_payload_shape_when_non_registered_in_all_envs
  - command_retry_idempotency_rules
stage1_checkpoint:
  date: 2026-04-17
  datssol_runtime: concrete
  semantic_success_rule: "code == 0 and errors is empty"
  remaining_unknowns:
    - duplicate submit edge cases under live load
    - production rate limits / retry policy nuances
